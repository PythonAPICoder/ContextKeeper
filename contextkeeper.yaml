app:
  name: "ContextKeeper"
  environment: "development"

server:
  host: "0.0.0.0"
  port: 11500

ollama:
  base_url: "http://192.168.0.100:11434"
  timeout_seconds: 120

logging:
  level: "INFO"   # OFF, DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: "logs/contextkeeper.log"
  request_log_enabled: true
  log_request_bodies: false

metrics:
  enabled: true
  gpu_enabled: true
  refresh_interval_seconds: 2

dashboard:
  enabled: true
  title: "ContextKeeper Dashboard"

context:
  enabled: false
  default_context_window_tokens: 16384
  warning_threshold_percent: 75
  compression_threshold_percent: 85
  keep_recent_messages: 8

compression:
  enabled: false
  summarizer_model: "gpt-oss:20b"
  max_summary_tokens: 1200
